name: Daily French For Canada Publish

on:
  workflow_dispatch:
    inputs:
      upload_mode:
        description: "Run mode"
        required: true
        default: "private"
        type: choice
        options:
          - auth-check
          - none
          - private
      episode_topic:
        description: "Optional explicit topic override"
        required: false
        type: string
  schedule:
    - cron: "17 7 * * *"

concurrency:
  group: daily-french-for-canada-publish
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FRENCH_CANADA_CHANNEL_PROFILE: the_french_pod_club
      YOUTUBE_CHANNEL_CONFIG: ${{ github.workspace }}/automation/vendor/youtube_channel_profiles.json
      YOUTUBE_TOKEN_FILE: ${{ github.workspace }}/secrets/youtube_token_the_english_pod_club.pickle
      YOUTUBE_CLIENT_SECRETS: ${{ github.workspace }}/secrets/client_secrets_channel2.json
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements-worker.txt

      - name: Restore YouTube credential files
        shell: python
        env:
          YOUTUBE_TOKEN_PICKLE_B64: ${{ secrets.YOUTUBE_TOKEN_PICKLE_B64 }}
          YOUTUBE_CLIENT_SECRETS_JSON_B64: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON_B64 }}
        run: |
          import base64
          import os
          from pathlib import Path

          secrets_dir = Path("secrets")
          secrets_dir.mkdir(parents=True, exist_ok=True)
          files = {
              "youtube_token_channel2.pickle": os.environ["YOUTUBE_TOKEN_PICKLE_B64"],
              "youtube_token_the_english_pod_club.pickle": os.environ["YOUTUBE_TOKEN_PICKLE_B64"],
              "client_secrets_channel2.json": os.environ["YOUTUBE_CLIENT_SECRETS_JSON_B64"],
          }
          for name, payload in files.items():
              (secrets_dir / name).write_bytes(base64.b64decode(payload))

      - name: Run daily episode pipeline
        shell: python
        env:
          INPUT_TOPIC: ${{ github.event.inputs.episode_topic }}
          INPUT_UPLOAD_MODE: ${{ github.event.inputs.upload_mode }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          workspace = Path.cwd()
          channel_config = str((workspace / "automation/vendor/youtube_channel_profiles.json").resolve())
          client_secrets = str((workspace / "secrets/client_secrets_channel2.json").resolve())

          upload_mode = os.environ.get("INPUT_UPLOAD_MODE") or "private"
          if os.environ.get("EVENT_NAME") == "schedule":
              upload_mode = "private"
          elif upload_mode not in {"auth-check", "none"}:
              upload_mode = "private"

          if upload_mode == "auth-check":
              command = [
                  sys.executable,
                  "automation/vendor/upload_to_youtube.py",
                  "--channel-profile",
                  os.environ["FRENCH_CANADA_CHANNEL_PROFILE"],
                  "--channel-config",
                  channel_config,
                  "--token-file",
                  str((workspace / "secrets/youtube_token_the_english_pod_club.pickle").resolve()),
                  "--client-secrets",
                  client_secrets,
                  "--auth-only",
              ]
              subprocess.run(command, check=True)
              raise SystemExit(0)

          title = (os.environ.get("INPUT_TOPIC") or "").strip() or "French for Canada: First Appointments and Daily Life"

          build_command = [
              sys.executable,
              "automation/build_french_for_canada_long_episode.py",
              "--output-root",
              "runs",
              "--background",
              "video/download.mp4",
              "--title",
              title,
          ]
          subprocess.run(build_command, check=True, timeout=5400)

          summaries = sorted((workspace / "runs").glob("*/build_summary.json"), key=lambda path: path.stat().st_mtime)
          if not summaries:
              raise RuntimeError("No build_summary.json was created")
          summary = json.loads(summaries[-1].read_text(encoding="utf-8"))

          video = summary["mp4"]
          youtube_title = Path(summary["youtube_title"]).read_text(encoding="utf-8").strip()
          youtube_description = Path(summary["youtube_description"]).read_text(encoding="utf-8").strip()
          thumbnail = workspace / "branding/french_for_canada_thumbnail.png"

          upload_command = [
              sys.executable,
              "automation/vendor/upload_to_youtube.py",
              "--channel-profile",
              os.environ["FRENCH_CANADA_CHANNEL_PROFILE"],
              "--channel-config",
              channel_config,
              "--token-file",
              str((workspace / "secrets/youtube_token_the_english_pod_club.pickle").resolve()),
              "--client-secrets",
              client_secrets,
              "--video",
              video,
              "--title",
              youtube_title,
              "--description",
              youtube_description,
              "--tags",
              "French for Canada,Quebec French,learn French,TEF practice,French podcast,French listening,French speaking,immigration French,Canada newcomers",
              "--category",
              "27",
              "--privacy",
              "private",
              "--synthetic-media",
              "yes",
          ]
          if thumbnail.exists():
              upload_command.extend(["--thumbnail", str(thumbnail)])
          if upload_mode != "none":
              subprocess.run(upload_command, check=True, timeout=3600)

      - name: Upload episode artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: french-for-canada-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            runs/**
