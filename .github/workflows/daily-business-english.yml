name: Daily Business English Publish

on:
  workflow_dispatch:
    inputs:
      upload_mode:
        description: "YouTube privacy"
        required: true
        default: "private"
        type: choice
        options:
          - auth-check
          - none
          - private
          - unlisted
          - public
      episode_topic:
        description: "Optional explicit topic override"
        required: false
        type: string
  schedule:
    - cron: "17 7 * * *"

concurrency:
  group: daily-business-english-publish
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      BUSINESS_ENGLISH_BASE_DIR: ${{ github.workspace }}
      BUSINESS_ENGLISH_OUTPUT_ROOT: ${{ github.workspace }}/runs
      BUSINESS_ENGLISH_BUILD_SCRIPT: ${{ github.workspace }}/build_business_english_episode.py
      BUSINESS_ENGLISH_BACKGROUND: ${{ github.workspace }}/generated_background.mp4
      BUSINESS_ENGLISH_UPLOAD_SCRIPT: ${{ github.workspace }}/automation/vendor/upload_to_youtube.py
      BUSINESS_ENGLISH_CHANNEL_TITLE: The English Pod Club
      BUSINESS_ENGLISH_FEMALE_VOICE: Sadachbia
      BUSINESS_ENGLISH_MALE_VOICE: Puck
      BUSINESS_ENGLISH_CHANNEL_PROFILE: the_english_pod_club
      YOUTUBE_CHANNEL_CONFIG: ${{ github.workspace }}/automation/vendor/youtube_channel_profiles.json
      YOUTUBE_TOKEN_FILE: ${{ github.workspace }}/secrets/youtube_token_the_english_pod_club.pickle
      YOUTUBE_CLIENT_SECRETS: ${{ github.workspace }}/secrets/client_secrets_channel2.json
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements-worker.txt

      - name: Create generated background video
        run: |
          ffmpeg -y \
            -f lavfi -i color=c=0x10233c:s=1280x720:d=720 \
            -vf "drawbox=x=0:y=600:w=1280:h=120:color=0xf2c94cff:t=fill,format=yuv420p" \
            -c:v libx264 -pix_fmt yuv420p generated_background.mp4

      - name: Restore YouTube credential files
        shell: python
        env:
          YOUTUBE_TOKEN_PICKLE_B64: ${{ secrets.YOUTUBE_TOKEN_PICKLE_B64 }}
          YOUTUBE_CLIENT_SECRETS_JSON_B64: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON_B64 }}
        run: |
          import base64
          import os
          from pathlib import Path

          secrets_dir = Path("secrets")
          secrets_dir.mkdir(parents=True, exist_ok=True)
          files = {
              "youtube_token_channel2.pickle": os.environ["YOUTUBE_TOKEN_PICKLE_B64"],
              "youtube_token_the_english_pod_club.pickle": os.environ["YOUTUBE_TOKEN_PICKLE_B64"],
              "client_secrets_channel2.json": os.environ["YOUTUBE_CLIENT_SECRETS_JSON_B64"],
          }
          for name, payload in files.items():
              (secrets_dir / name).write_bytes(base64.b64decode(payload))

      - name: Run daily episode pipeline
        shell: python
        env:
          INPUT_TOPIC: ${{ github.event.inputs.episode_topic }}
          INPUT_UPLOAD_MODE: ${{ github.event.inputs.upload_mode }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          import os
          import subprocess
          import sys
          from pathlib import Path

          workspace = Path.cwd()
          channel_config = str((workspace / "automation/vendor/youtube_channel_profiles.json").resolve())
          token_file = str((workspace / "secrets/youtube_token_channel2.pickle").resolve())
          client_secrets = str((workspace / "secrets/client_secrets_channel2.json").resolve())

          upload_mode = os.environ.get("INPUT_UPLOAD_MODE") or "private"
          if os.environ.get("EVENT_NAME") == "schedule":
              upload_mode = "private"

          if upload_mode == "auth-check":
              command = [
                  sys.executable,
                  "automation/vendor/upload_to_youtube.py",
                  "--channel-profile",
                  "the_english_pod_club",
                  "--channel-config",
                  channel_config,
                  "--token-file",
                  str((workspace / "secrets/youtube_token_the_english_pod_club.pickle").resolve()),
                  "--client-secrets",
                  client_secrets,
                  "--auth-only",
              ]
              subprocess.run(command, check=True)
              raise SystemExit(0)

          command = [
              sys.executable,
              "automation/run_daily_business_english_job.py",
              "--queue-file",
              "automation/business_english_topics.txt",
              "--state-file",
              "automation/automation_state.json",
              "--log-file",
              "automation/automation_history.jsonl",
              "--output-root",
              "runs",
              "--channel-profile",
              "the_english_pod_club",
              "--channel-config",
              channel_config,
              "--token-file",
              str((workspace / "secrets/youtube_token_the_english_pod_club.pickle").resolve()),
              "--client-secrets",
              client_secrets,
              "--synthetic-media",
              "yes",
          ]
          command.extend(["--upload-mode", upload_mode])

          topic = (os.environ.get("INPUT_TOPIC") or "").strip()
          if topic:
              command.extend(["--episode-topic", topic])

          subprocess.run(command, check=True)

      - name: Upload episode artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-english-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            runs/**
            automation/automation_history.jsonl
            automation/automation_state.json

      - name: Persist automation state
        if: success()
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- automation/automation_state.json automation/automation_history.jsonl)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/automation_state.json automation/automation_history.jsonl
          git commit -m "chore: advance business english automation state"
          git push
